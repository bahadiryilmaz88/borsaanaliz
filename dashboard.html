    <!-- STYLES -->
    <style>
        :root {
            --bg: #050505;
            --panel: #11141a;
            --border: #232730;
            --brand: #3b82f6;
            --success: #00c853;
            --danger: #ff1744;
        }

        body {
            background-color: var(--bg);
            color: #cfd8dc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #37474f;
        }

        .score-card {
            background: linear-gradient(145deg, #1a1f29, #11141a);
            border: 1px solid var(--border);
        }

        .module-item {
            background: #161a22;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .module-item:hover {
            background: #1c212b;
        }

        /* Chart Override for specific inputs */
        input.search-box {
            background: transparent;
            border: none;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            outline: none;
            width: 200px;
        }

        input::placeholder {
            color: #37474f;
        }

        /* PRICE FLASH ANIMATION */
        @keyframes flashGreen {
            0% {
                background-color: #22c55e;
                color: white;
            }

            100% {
                background-color: transparent;
            }
        }

        @keyframes flashRed {
            0% {
                background-color: #ef4444;
                color: white;
            }

            100% {
                background-color: transparent;
            }
        }

        .flash-up {
            animation: flashGreen 1s ease-out;
            border-radius: 4px;
        }

        .flash-down {
            animation: flashRed 1s ease-out;
            border-radius: 4px;
        }

        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 768px) {
            .search-box {
                width: 100% !important;
                font-size: 1.5rem !important;
            }

            .module-item {
                padding: 0.75rem !important;
            }

            /* Custom Scrollbar for Mobile hidden */
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }

            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }

        /* LANDSCAPE MODE */
        /* LANDSCAPE MODE (HUD) */
        @media (max-height: 500px) and (orientation: landscape) {
            .mobile-layout {
                flex-direction: row !important;
            }

            .mobile-sidebar {
                display: none !important;
            }

            /* Hide sidebar in landscape for full chart */

            .mobile-controls {
                position: fixed !important;
                top: 0 !important;
                bottom: 0 !important;
                right: 0 !important;
                left: auto !important;
                width: 60px !important;
                height: 100% !important;
                flex-direction: column !important;
                justify-content: center !important;
                background: rgba(22, 26, 34, 0.8) !important;
                /* Semi-transparent */
                backdrop-filter: blur(4px);
                border-top: none !important;
                border-left: 1px solid rgba(255, 255, 255, 0.1) !important;
                padding: 10px 0 !important;
                gap: 10px !important;
                overflow-y: auto !important;
            }

            /* Adjust control items for vertical layout */
            .mobile-controls>div {
                flex-direction: column !important;
                width: 100% !important;
                align-items: center !important;
            }

            .mobile-controls button {
                padding: 1px !important;
                font-size: 8px !important;
                width: 40px !important;
                text-align: center !important;
            }

            .mobile-controls .w-\[1px\] {
                width: 80% !important;
                height: 1px !important;
                margin: 5px 0 !important;
            }

            /* Hide FAB in landscape */
            .fab-container {
                display: none !important;
            }
        }
    </style>

"TRCAS", "TRGYO", "TRILC", "TSGYO", "TSKB", "TSPOR", "TTKOM", "TTRAK", "TUCLK", "TUKAS", "TUPRS", "TUREX", "TURGG", "TURSG", "UFUK", "ULAS", "ULKER", "ULUSE", "ULUUN", "UMPAS", "UNLU", "USAK", "UZERB", "VAKBN", "VAKFN", "VAKKO", "VANGD", "VBTYZ", "VERTU", "VERUS", "VESBE", "VESTL", "VKFYO", "VKGYO", "VKING", "YAPRK", "YATAS", "YAYLA", "YEOTK", "YESIL", "YGGYO", "YGYO", "YKBNK", "YKSLN", "YONGA", "YUNSA", "YYAPI", "ZEDUR", "ZOREN", "ZRGYO"
        ].sort();

        // --- TECHNICAL ANALYSIS ENGINE (AUTO-PILOT) ---
        const BB_PERIOD = 18;

        const Engine = {
            calcIchimoku: (data) => {
                const getHL = (start, period) => {
                    let h = -Infinity, l = Infinity;
                    for (let i = 0; i < period; i++) {
                        if (start - i < 0) break;
                        h = Math.max(h, data[start - i].high); l = Math.min(l, data[start - i].low);
                    }
                    return (h + l) / 2;
                };

                return data.map((d, i) => {
                    const tenkan = getHL(i, 9);
                    const kijun = getHL(i, 26);
                    const spanA = (tenkan + kijun) / 2;
                    const spanB = getHL(i, 52);
                    return { time: d.time, tenkan, kijun, spanA, spanB };
                });
            },

            calcRSI: (data, period = 14) => {
                if (!data || data.length <= period) return [];
                let gains = 0, losses = 0;
                // First average
                for (let i = 1; i <= period; i++) {
                    const diff = data[i].close - data[i - 1].close;
                    if (diff > 0) gains += diff; else losses -= diff;
                }
                let avgGain = gains / period;
                let avgLoss = losses / period;

                const rsiArray = [];
                for (let i = 0; i < period; i++) rsiArray.push(null);

                if (avgLoss === 0) rsiArray.push(100);
                else rsiArray.push(100 - (100 / (1 + (avgGain / avgLoss))));

                for (let i = period + 1; i < data.length; i++) {
                    const diff = data[i].close - data[i - 1].close;
                    if (diff > 0) { avgGain = (avgGain * 13 + diff) / 14; avgLoss = (avgLoss * 13) / 14; }
                    else { avgGain = (avgGain * 13) / 14; avgLoss = (avgLoss * 13 - diff) / 14; }

                    if (avgLoss === 0) rsiArray.push(100);
                    else rsiArray.push(100 - (100 / (1 + (avgGain / avgLoss))));
                }
                return rsiArray;
            },



            calcFib: (data) => {
                const lookback = data.slice(-100);
                let high = -Infinity, low = Infinity;
                lookback.forEach(d => { high = Math.max(high, d.high); low = Math.min(low, d.low); });
                return {
                    high,
                    low,
                    levels: [0, 0.382, 0.5, 0.618, 1].map(level => ({
                        level,
                        price: low + (high - low) * level
                    }))
                };
            },

            detectPattern: (data) => {
                if (!data || data.length < 2) return "None";
                const last = data[data.length - 1];
                const prev = data[data.length - 2];
                const isEngulfing = last.close > last.open && prev.close < prev.open && last.close > prev.open && last.open < prev.close;
                const body = Math.abs(last.close - last.open);
                const lowerWick = Math.min(last.close, last.open) - last.low;
                const isHammer = lowerWick > body * 2;

                if (isEngulfing) return "Engulfing";
                if (isHammer) return "Hammer";
                return "None";
            },

            calcSignal: (score) => {
                if (score >= 80) return { label: "GÜÇLÜ AL", color: "text-green-500", bg: "bg-green-500/20" };
                if (score >= 60) return { label: "AL", color: "text-green-400", bg: "bg-green-400/20" };
                if (score >= 40) return { label: "NÖTR", color: "text-gray-400", bg: "bg-gray-400/20" };
                if (score >= 20) return { label: "SAT", color: "text-red-400", bg: "bg-red-400/20" };
                return { label: "GÜÇLÜ SAT", color: "text-red-600", bg: "bg-red-600/20" };
            },

            // --- GELİŞMİŞ "TRINITY" (ÜÇLÜ ONAY) SİNYAL MOTORU ---
            generateSignals: (data, mode = 'conservative') => {
                // 1. İndikatörleri Hesapla
                const rsiArray = Engine.calcRSI(data, 14);

                // SMA 200 (Trend), BB (20,2), VolSMA (20)
                const sma200 = [];
                const bbArray = [];
                const volSma = [];

                const bbPeriod = BB_PERIOD;
                const bbMult = 2;

                let sum200 = 0;

                for (let i = 0; i < data.length; i++) {
                    // SMA 200
                    sum200 += data[i].close;
                    if (i >= 200) sum200 -= data[i - 200].close;
                    sma200.push(i >= 199 ? sum200 / 200 : null);

                    // Bollinger & Volume SMA
                    if (i >= bbPeriod - 1) {
                        const slice = data.slice(i - bbPeriod + 1, i + 1);

                        // Fiyat BB
                        const mean = slice.reduce((acc, val) => acc + val.close, 0) / bbPeriod;
                        const variance = slice.reduce((acc, val) => acc + Math.pow(val.close - mean, 2), 0) / bbPeriod;
                        const stdDev = Math.sqrt(variance);

                        bbArray.push({
                            upper: mean + (bbMult * stdDev),
                            lower: mean - (bbMult * stdDev),
                            middle: mean
                        });

                        // Hacim SMA
                        const volMean = slice.reduce((acc, val) => acc + val.volume, 0) / bbPeriod;
                        volSma.push(volMean);
                    } else {
                        bbArray.push(null);
                        volSma.push(null);
                    }
                }

                // 2. Sinyal Tarama Döngüsü
                return data.map((d, i) => {
                    let item = { ...d, buy_signal: false, sell_signal: false };

                    // Veri yeterli değilse geç
                    if (i < 200 || !sma200[i] || !bbArray[i] || !volSma[i]) return item;

                    const price = d.close;
                    const prevD = data[i - 1];
                    const rsi = rsiArray[i];
                    const prevRsi = rsiArray[i - 1];
                    const trendLine = sma200[i];
                    const bb = bbArray[i];
                    const prevBB = bbArray[i - 1];
                    const avgVol = volSma[i];

                    // Band Width & Expansion Check
                    const bw = bb ? (bb.upper - bb.lower) / bb.middle : 0;
                    const prevBW = prevBB ? (prevBB.upper - prevBB.lower) / prevBB.middle : 0;
                    const isExpanding = bw > prevBW;

                    // --- MODA GÖRE STRATEJİ SEÇİMİ ---

                    if (mode === 'conservative') {
                        // === STRATEJİ 1: TRINITY (GÜVENLİ TREND) ===
                        // 1. Trend Yukarı (SMA200 Üstü)
                        // 2. Fiyat Ucuzlamış (Önceki mum BB Alt Bandına değmiş)
                        // 3. Dönüş Başlamış (RSI Yükseliyor ve Fiyat BB içine girmiş)

                        const condTrend = price > trendLine;
                        const condCheap = prevD.low <= prevBB.lower;
                        const condReversal = price > bb.lower && rsi > prevRsi;

                        if (condTrend && condCheap && condReversal) {
                            item.buy_signal = true;
                        }

                        // Satış (Kâr Al veya Stop)
                        if ((price > bb.upper && rsi > 70) || (prevD.close > trendLine && price < trendLine)) {
                            item.sell_signal = true;
                        }

                    } else {
                        // === STRATEJİ 2: SNIPER (AGRESİF DİP AVCISI) ===
                        // 1. Aşırı Satım (Bollinger delinmiş + RSI < 32)
                        // 2. Hacim Patlaması (Ortalamanın 1.2 katı)
                        // 3. Yeşil Mum Yakmış

                        const wasOversold = prevD.low <= prevBB.lower;
                        const rsiBuyZone = prevRsi < 32 && rsi > prevRsi; // 32 altından dönüş
                        const volSpike = d.volume > avgVol * 1.2;
                        const isGreen = d.close > d.open;

                        if (wasOversold && rsiBuyZone && volSpike && isGreen && isExpanding) {
                            item.buy_signal = true;
                        }

                        // Satış (Tepki bitişi)
                        if (d.high >= bb.upper && rsi > 65) {
                            item.sell_signal = true;
                        }
                    }

                    return item;
                });
            },

            run: (json) => {
                const ohlc = json.ohlc;
                if (!ohlc || ohlc.length < 5) return null; // Safety check (Relaxed to 5 for IPOs)

                const ichi = Engine.calcIchimoku(ohlc);
                const fib = Engine.calcFib(ohlc);
                const pattern = Engine.detectPattern(ohlc);
                const rsiArr = Engine.calcRSI(ohlc);
                const rsi = rsiArr[rsiArr.length - 1];
                const rsiPrev = rsiArr.at(-2) ?? rsi;
                const rsiSlope = rsi > rsiPrev ? 'UP' : 'DOWN';



                // --- SCORING ---
                const last = ohlc[ohlc.length - 1];

                // 1. Ichimoku Logic: Check Cloud (SpanA/B from 26 bars ago)
                const cloudIdx = ohlc.length - 1 - 26;
                let cloudStatus = "Neutral";
                if (cloudIdx >= 0) {
                    const c = ichi[cloudIdx];
                    const top = Math.max(c.spanA, c.spanB);
                    const bot = Math.min(c.spanA, c.spanB);
                    if (last.close > top) cloudStatus = "Above";
                    else if (last.close < bot) cloudStatus = "Below";
                    else cloudStatus = "Inside";
                }

                // Scores
                const sDir = cloudStatus === 'Above' ? 25 : 0;
                const sStr = 8; // Default good structure in auto mode
                const sMom = 12; // Default good momentum
                const sBias = pattern !== 'None' ? 20 : 0;
                const sCat = 10;

                // Risk (Dynamic Swing Low)
                let swingLow = Infinity;
                for (let i = ohlc.length - 20; i < ohlc.length; i++) {
                    if (ohlc[i]) swingLow = Math.min(swingLow, ohlc[i].low);
                }
                let suggestedStop = swingLow * 0.995; // Just below support
                let riskPct = (last.close - suggestedStop) / last.close;

                // STRICT RULE: Max Stop 12% (User Request: 8-12% range).
                // If technical stop is wider than 12%, cap it at 12%.
                if (riskPct > 0.12) { suggestedStop = last.close * 0.88; riskPct = 0.12; }

                let suggestedTarget = last.close + (last.close - suggestedStop) * 2.5; // Aim for 2.5R
                let rr = (suggestedTarget - last.close) / (last.close - suggestedStop);

                let sRisk = (riskPct <= 0.12 && rr >= 2) ? 15 : 0; // Score logic based on feasibility

                // Smart Entry Zone (Fib 0.5 + Kijun Confluence)
                const fib50 = fib.levels[2].price;
                const ichiNow = ichi[ichi.length - 1];
                const kijun = ichiNow.kijun;
                const zoneHigh = Math.max(fib50, kijun);
                const zoneLow = Math.min(fib50, kijun) * 0.99;

                const total = sDir + sStr + sMom + sBias + sCat + sRisk;
                const signal = Engine.calcSignal(total);

                return {
                    ichi, fib, pattern, cloudStatus, rsi, rsiSlope,
                    risk: { stop: suggestedStop, target: suggestedTarget, rr, riskPct, zoneLow, zoneHigh },
                    scores: { sDir, sStr, sMom, sBias, sCat, sRisk, total },
                    trend_health: json.cascade?.trend_health,
                    sma_analysis: json.cascade?.sma_analysis,
                    target: json.cascade?.target,
                    signal,
                    pattern_4h: json.cascade?.pattern_4h,
                    cascade: json.cascade, // Pass full cascade data for visualization
                    sell_zone: json.cascade?.trend_health?.sell_zone // Pass Sell Zone info
                };
            }
        };

        const Chart = ({ data, indicators, visible = { ichi: false, fib: false, sma: false, bb: false, vol: false, pattern: false }, onSeriesReady }) => {
            const container = useRef();
            const chartRef = useRef(null);
            const seriesRef = useRef({});
            const savedMarkers = useRef([]); // Markerları hafızada tutmak için

            // 1. INIT CHART (Run once)
            useEffect(() => {
                if (!container.current) return;

                const chart = LightweightCharts.createChart(container.current, {
                    layout: { background: { color: '#0E1015' }, textColor: '#cfd8dc' },
                    grid: { vertLines: { color: '#232730', style: 1 }, horzLines: { color: '#232730', style: 1 } },
                    width: container.current.clientWidth, height: container.current.clientHeight,
                    rightPriceScale: { visible: true, borderColor: '#232730', scaleMargins: { top: 0.1, bottom: 0.2 } },
                    crosshair: { mode: 1 }, timeScale: { rightOffset: 5, borderColor: '#232730' }
                });

                const candles = chart.addCandlestickSeries({ upColor: '#00b746', downColor: '#ef403c', borderVisible: true, wickUpColor: '#00b746', wickDownColor: '#ef403c', borderUpColor: '#00b746', borderDownColor: '#ef403c' });
                const volume = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '', scaleMargins: { top: 0.8, bottom: 0 } });

                // Indicators Lines (Init empty)
                const tenkan = chart.addLineSeries({ color: '#2962FF', lineWidth: 1, title: 'Tenkan' });
                const kijun = chart.addLineSeries({ color: '#B71C1C', lineWidth: 1, title: 'Kijun' });

                // Init Fib Lines (Fixed Set)
                const fibLevels = [0, 0.382, 0.5, 0.618, 1];
                const fibLines = {};
                fibLevels.forEach(level => {
                    fibLines[level] = chart.addLineSeries({
                        color: (level === 0.618 || level === 0.382) ? '#d500f9' : '#787b86',
                        lineWidth: 1, lineStyle: 2, title: `Fib ${level}`
                    });
                });

                // Save refs
                chartRef.current = chart;
                seriesRef.current = { candles, volume, tenkan, kijun, sma50: null, sma200: null, bbUp: null, bbLow: null, fibLines };

                if (onSeriesReady) onSeriesReady({ candles, volume });

                const ro = new ResizeObserver(entries => {
                    if (entries[0] && chartRef.current) {
                        const { width, height } = entries[0].contentRect;
                        chartRef.current.applyOptions({ width, height });
                    }
                });
                ro.observe(container.current);

                return () => {
                    ro.disconnect();
                    if (chartRef.current) {
                        chartRef.current.remove();
                        chartRef.current = null;
                    }
                };
            }, []);

            // 2. DATA UPDATE
            useEffect(() => {
                if (!chartRef.current || !data) return;
                const { candles, volume, tenkan, kijun } = seriesRef.current;

                // Sort & Clean Data
                const unique = Array.from(new Map(data.map(i => [i.time, i])).values()).sort((a, b) => {
                    const tA = typeof a.time === 'number' ? a.time : new Date(a.time).getTime() / 1000;
                    const tB = typeof b.time === 'number' ? b.time : new Date(b.time).getTime() / 1000;
                    return tA - tB;
                });

                candles.setData(unique);
                volume.setData(unique.map(d => ({ time: d.time, value: d.volume, color: d.close >= d.open ? 'rgba(0, 183, 70, 0.5)' : 'rgba(239, 64, 60, 0.5)' })));
                volume.applyOptions({ visible: visible.vol });

                // --- SCALING FIX ---
                // Force chart to fit the new content ranges
                chartRef.current.timeScale().fitContent();
                chartRef.current.priceScale('right').applyOptions({
                    autoScale: true,
                });


                // Update Markers (Accumulate first, set later)
                const markers = [];
                unique.forEach(d => {
                    if (d.buy_signal) markers.push({ time: d.time, position: 'belowBar', color: '#00E676', shape: 'arrowUp', text: 'AL', size: 2 });
                    if (d.sell_signal) markers.push({ time: d.time, position: 'aboveBar', color: '#FF1744', shape: 'arrowDown', text: 'SAT', size: 2 });
                });

                // Update Ichimoku Data
                if (indicators?.ichi) {
                    tenkan.setData(indicators.ichi.filter(x => x.tenkan).map(x => ({ time: x.time, value: x.tenkan })));
                    kijun.setData(indicators.ichi.filter(x => x.kijun).map(x => ({ time: x.time, value: x.kijun })));
                    tenkan.applyOptions({ visible: visible.ichi });
                    kijun.applyOptions({ visible: visible.ichi });
                }



                // SMA
                if (indicators) {
                    // Helper: Calc SMA
                    const calculateSMA = (period) => {
                        if (unique.length < period) return [];
                        const smaData = [];
                        for (let i = period - 1; i < unique.length; i++) {
                            const sum = unique.slice(i - period + 1, i + 1).reduce((acc, val) => acc + val.close, 0);
                            smaData.push({ time: unique[i].time, value: sum / period });
                        }
                        return smaData;
                    };

                    // SMA 50
                    if (!seriesRef.current.sma50) {
                        seriesRef.current.sma50 = chartRef.current.addLineSeries({ color: '#FFD600', lineWidth: 2, title: 'SMA 50' });
                    }
                    seriesRef.current.sma50.setData(calculateSMA(50));

                    // SMA 200
                    if (!seriesRef.current.sma200) {
                        seriesRef.current.sma200 = chartRef.current.addLineSeries({ color: '#FF6D00', lineWidth: 2, title: 'SMA 200' });
                    }
                    seriesRef.current.sma200.setData(calculateSMA(200));

                    // Apply Visibility
                    seriesRef.current.sma50?.applyOptions({ visible: visible.sma });
                    seriesRef.current.sma200?.applyOptions({ visible: visible.sma });

                    // Bollinger
                    const calculateBB = (period = BB_PERIOD, mult = 2) => {
                        if (unique.length < period) return [];
                        const bbData = [];
                        for (let i = period - 1; i < unique.length; i++) {
                            const slice = unique.slice(i - period + 1, i + 1);
                            const mean = slice.reduce((acc, val) => acc + val.close, 0) / period;
                            const variance = slice.reduce((acc, val) => acc + Math.pow(val.close - mean, 2), 0) / period;
                            const stdDev = Math.sqrt(variance);
                            bbData.push({ time: unique[i].time, upper: mean + mult * stdDev, lower: mean - mult * stdDev });
                        }
                        return bbData;
                    };
                    const bb = calculateBB();

                    if (!seriesRef.current.bbUp) {
                        seriesRef.current.bbUp = chartRef.current.addLineSeries({ color: '#ef5350', lineWidth: 1, title: 'BB Upper' });
                    }
                    seriesRef.current.bbUp.setData(bb.map(d => ({ time: d.time, value: d.upper })));

                    if (!seriesRef.current.bbLow) {
                        seriesRef.current.bbLow = chartRef.current.addLineSeries({ color: '#26a69a', lineWidth: 1, title: 'BB Lower' });
                    }
                    seriesRef.current.bbLow.setData(bb.map(d => ({ time: d.time, value: d.lower })));

                    // Apply Visibility
                    seriesRef.current.bbUp?.applyOptions({ visible: visible.bb });
                    seriesRef.current.bbLow?.applyOptions({ visible: visible.bb });

                    // Fib (Optimized Update)
                    if (indicators?.fib?.levels) {
                        indicators.fib.levels.forEach(l => {
                            const line = seriesRef.current.fibLines[l.level];
                            if (line) {
                                line.setData(unique.map(d => ({ time: d.time, value: l.price })));
                                line.applyOptions({ visible: visible.fib });
                            }
                        });
                    }

                    // --- CASCADE STRATEGY VISUALS (NEW) ---
                    // Clear old Cascade Lines (PriceLines attached to main series)
                    if (seriesRef.current.cascadeLines) {
                        seriesRef.current.cascadeLines.forEach(l => candles.removePriceLine(l));
                    }
                    seriesRef.current.cascadeLines = [];

                    if (indicators?.cascade) {
                        const cas = indicators.cascade;

                        // 1. Setup Zone (If Waiting or Setup Ready)
                        // Backend returns 'zone': [fib618, fib500]
                        if (cas.zone && (cas.status === 'WAITING' || cas.status === 'SETUP_READY')) {
                            const zoneTop = Math.max(...cas.zone);
                            const zoneBot = Math.min(...cas.zone);

                            const l1 = candles.createPriceLine({ price: zoneTop, color: '#9C27B0', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'SETUP ZONE TOP' });
                            const l2 = candles.createPriceLine({ price: zoneBot, color: '#9C27B0', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'SETUP ZONE BOT' });
                            seriesRef.current.cascadeLines.push(l1, l2);
                        }

                        // 2. Trade Levels (Stop/Target/Entry) - Only if Active or Setup Ready (preview)
                        if (cas.levels && (cas.trigger_active || cas.setup_active)) {
                            if (cas.levels.stop) {
                                const l = candles.createPriceLine({ price: cas.levels.stop, color: '#FF1744', lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: 'STOP' });
                                seriesRef.current.cascadeLines.push(l);
                            }
                            if (cas.levels.target) {
                                const l = candles.createPriceLine({ price: cas.levels.target, color: '#00E676', lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: 'TARGET' });
                                seriesRef.current.cascadeLines.push(l);
                            }
                            if (cas.levels.price) {
                                const l = candles.createPriceLine({ price: cas.levels.price, color: '#2979FF', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'ENTRY' });
                                seriesRef.current.cascadeLines.push(l);
                            }
                        }

                        // 3. Trigger Marker
                        if (cas.trigger_active) {
                            const lastTime = unique[unique.length - 1].time;
                            markers.push({
                                time: lastTime,
                                position: 'belowBar',
                                color: '#00E676',
                                shape: 'arrowUp',
                                text: 'CASCADE GİRİŞ',
                                size: 2
                            });
                        }


                        // 4. SELL ZONE VISUALS
                        if (indicators.cascade && indicators.sell_zone && indicators.sell_zone.score >= 3) {
                            const lastTime = unique[unique.length - 1].time;
                            markers.push({
                                time: lastTime,
                                position: 'aboveBar',
                                color: '#e91e63',
                                shape: 'arrowDown',
                                text: `SAT BÖLGESİ (${indicators.sell_zone.score}/5)`,
                                size: 2
                            });
                        }
                    }
                } // End Indicators check

                // SAVE MARKERS STATE
                savedMarkers.current = markers;
                if (visible.pattern) candles.setMarkers(markers);
                else candles.setMarkers([]);
            }, [data, indicators]);

            // 3. VISIBILITY UPDATE
            useEffect(() => {
                if (!chartRef.current) return;
                const s = seriesRef.current;

                // Ichi
                if (s.tenkan) s.tenkan.applyOptions({ visible: visible.ichi });
                if (s.kijun) s.kijun.applyOptions({ visible: visible.ichi });

                // Vol
                if (s.volume) s.volume.applyOptions({ visible: visible.vol });

                // SMA
                if (s.sma50) s.sma50.applyOptions({ visible: visible.sma });
                if (s.sma200) s.sma200.applyOptions({ visible: visible.sma });

                // BB
                if (s.bbUp) s.bbUp.applyOptions({ visible: visible.bb });
                if (s.bbLow) s.bbLow.applyOptions({ visible: visible.bb });



                // If Stoch is ON, we might want to hide volume or share space, 
                // but currently they assume same 'scaleMargins' (overlapping bottom).
                // Improvements for future: Dynamically adjust scaleMargins.

                // Fib
                if (s.fibLines) {
                    Object.values(s.fibLines).forEach(l => l.applyOptions({ visible: visible.fib }));
                }

                // Pattern Markers Toggle (Using savedMarkers ref)
                if (s.candles) {
                    if (visible.pattern) {
                        s.candles.setMarkers(savedMarkers.current || []);
                    } else {
                        s.candles.setMarkers([]);
                    }
                }

            }, [visible]);

            return <div ref={container} className="w-full h-full bg-[#0E1015] relative" />;
        };

        // --- APP ---
        const App = () => {
            const [symbol, setSymbol] = useState('');
            const [data, setData] = useState(null);
            const [rsiSpecialScanning, setRsiSpecialScanning] = useState(false);
            const [rsiSpecialResults, setRsiSpecialResults] = useState(null);

            const dataRef = useRef(data);
            dataRef.current = data;
            const [result, setResult] = useState(null);
            const [sug, setSug] = useState([]);
            const [stockNames, setStockNames] = useState({});
            const [dailyChange, setDailyChange] = useState(null);
            const [interval, setIntervalVal] = useState('4h');

            // --- ALARM STATE REMOVED ---

            const loadData = async (sym, silent = false, intv = interval, mode = riskMode) => {

                    // Daily Change Calc

                        const newP = json.currentPrice;
                        if (newP > oldP) { setFlash('up'); setTimeout(() => setFlash(null), 1000); }
                        else if (newP < oldP) { setFlash('down'); setTimeout(() => setFlash(null), 1000); }
                    }

                    setData(finalData);
                    setResult(analysis);
                    setAdvResults(jsonAdv); // Set Advanced Data

                    if (!silent) {
                        setSymbol(json.symbol.replace('.IS', ''));
                        setSug([]);
                        setFlash(null);
                        setIntervalVal(intv);
                        setRiskMode(mode);
                    }
                } catch (e) { console.error(e); if (!silent) alert(e.message); }
            };

            const runManualScan = async () => {
                if (manualScanning) return;
                setManualScanning(true);
                setManualScanResults(null);
                try {
                    const res = await fetch('/scan_last_day_buy');
                    const data = await res.json();
                    if (data.results) {
                        setManualScanResults(data.results);
                    }
                } catch (e) {
                    alert("Tarama hatası: " + e);
                }
                setManualScanning(false);
            };

            const handleSearch = (e) => {
                const v = e.target.value.toUpperCase();
                setSymbol(v);
                // Search both by symbol and company name
                setSug(v ? ALL_BIST.filter(s => {
                    const name = stockNames[s] || '';
                    return s.startsWith(v) || name.toUpperCase().includes(v);
                }).slice(0, 10) : []);
            };

            // --- CHART DATA & INDICATOR PREPARATION ---
            const chartData = useMemo(() => {
                if (!data) return [];
                // Backend returns the correct currency data in 'ohlc' field
                return data.ohlc || [];
            }, [data]);

            const chartIndicators = useMemo(() => {
                // 'result' is already calculated based on the loaded data (TL or USD) via Engine.run in loadData
                return result;
            }, [result]);

            // --- RENDER SCORECARD ---
            const ScoreItem = ({ label, score, max, info, status }) => {
                const pct = (score / max) * 100;
                const col = status === 'FAIL' ? 'bg-red-500' : pct === 100 ? 'bg-green-500' : pct > 50 ? 'bg-yellow-500' : 'bg-gray-600';
                return (
                    <div className="module-item p-4">
                        <div className="flex justify-between items-center mb-1">
                            <span className="font-bold text-gray-300">{label}</span>
                            <span className={`text-xs px-2 py-0.5 rounded text-black font-bold ${col}`}>
                                {status || `${score}/${max}`}
                            </span>
                        </div>
                        {score !== undefined && (
                            <div className="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                                <div className={`h-full ${col}`} style={{ width: `${pct}%` }}></div>
                            </div>
                        )}
                        <div className="text-xs text-gray-500 mt-1">{info}</div>
                    </div>
                )
            };



            // MOBILE CONTROLS COMPONENT
            const MobileControls = () => {
                const indicators = [
                    { id: 'sma', label: 'SMA', isActive: showSMA, toggle: () => setShowSMA(!showSMA) },
                    { id: 'ema', label: 'EMA', isActive: showEMA, toggle: () => setShowEMA(!showEMA) },
                    { id: 'bb', label: 'BB', isActive: showBollinger, toggle: () => setShowBollinger(!showBollinger) },
                    { id: 'st', label: 'ST', isActive: showSuperTrend, toggle: () => setShowSuperTrend(!showSuperTrend) },
                    { id: 'ich', label: 'ICH', isActive: showIchimoku, toggle: () => setShowIchimoku(!showIchimoku) },
                ];

                return (
                    <div className={`
                        mobile-controls fixed bottom-0 left-0 right-0 z-[60] bg-[#161a22] border-t border-[#232730] px-4 py-2 
                        flex items-center gap-3 overflow-x-auto scrollbar-hide
                        transition-all duration-300 transform
                        ${mobileMenuOpen ? 'translate-y-full opacity-0' : 'translate-y-0 opacity-100'}
                        md:hidden
                    `} style={{ height: '60px', paddingBottom: 'env(safe-area-inset-bottom)' }}>

                        {/* Quick Interval - Simplified */}
                        <div className="flex bg-[#0d1015] rounded border border-gray-700 p-0.5 shrink-0">
                            {['60m', '4h', '1d'].map(t => (
                                <button
                                    key={t}
                                    onClick={() => loadData(symbol, false, t)}
                                    className={`px-2 py-1 text-[10px] font-bold rounded ${interval === t ? 'bg-blue-600 text-white' : 'text-gray-500'}`}
                                >
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        <div className="w-[1px] h-6 bg-gray-700 shrink-0"></div>

                        {/* Indicators */}
                        <div className="flex gap-2 shrink-0">
                            {indicators.map(t => (
                                <button
                                    key={t.id}
                                    onClick={t.toggle}
                                    className={`
                                        whitespace-nowrap px-3 py-1.5 rounded text-[10px] font-bold border transition-colors
                                        ${t.isActive ? 'bg-blue-600 border-blue-500 text-white' : 'bg-[#0d1015] border-gray-700 text-gray-400'}
                                    `}
                                >
                                    {t.label}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            // QR CODE MODAL
            const QRModal = () => (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm" onClick={() => setShowQR(false)}>
                    <div className="bg-[#161a22] p-6 rounded-xl border border-gray-700 max-w-sm w-full mx-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-white">Mobil Bağlantı</h3>
                            <button onClick={() => setShowQR(false)} className="text-gray-400 hover:text-white"><i className="ri-close-line text-2xl"></i></button>
                        </div>
                        <div className="flex flex-col items-center gap-4">
                            <div className="bg-white p-2 rounded">
                                <img src="/qr" alt="Scan QR" className="w-48 h-48" />
                            </div>
                            <div className="text-center">
                                <p className="text-sm text-gray-400 mb-1">veya tarayıcınıza şunu yazın:</p>
                                <div className="font-mono text-xl font-bold text-blue-400 bg-blue-900/20 px-3 py-1 rounded">
                                    {serverIP}:5000
                                </div>
                            </div>
                            <p className="text-xs text-center text-gray-500 mt-2">
                                Telefonunuzun ve bilgisayarınızın aynı Wi-Fi ağında olduğundan emin olun.
                            </p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="mobile-layout flex flex-col md:flex-row w-full h-full text-[#cfd8dc] overflow-hidden relative">
                    {showQR && <QRModal />}
                    {isMobile && <MobileControls />}

                    {/* LEFT ANALYTICS PANEL (SIDEBAR / BOTTOM SHEET) */}
                    <div className={`
                        mobile-sidebar flex flex-col border-r border-[#232730] bg-[#11141a] z-[50] shadow-2xl transition-all duration-300
                        md:w-[420px] md:relative md:translate-y-0
                        ${isMobile ? 'fixed bottom-0 left-0 right-0 rounded-t-2xl border-t border-gray-700 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]' : ''}
                        ${isMobile && !mobileMenuOpen ? 'h-[80px] hover:h-[90px]' : isMobile && mobileMenuOpen ? 'h-[85%]' : 'h-full'}
                        ${isMobile && !mobileMenuOpen ? 'pb-[60px]' : ''} /* Space for controls */
                    `}>
                        {/* MOBILE DRAG HANDLE */}
                        {isMobile && (
                            <div
                                className="mobile-drag-handle w-full flex justify-center py-3 cursor-pointer bg-[#161a22] rounded-t-2xl border-b border-gray-800 hover:bg-gray-800 transition-colors"
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                            >
                                <div className="w-12 h-1.5 bg-gray-600 rounded-full"></div>
                            </div>
                        )}

                        {/* Header / Search */}
                        <div className="p-6 border-b border-[#232730] bg-[#0E1015]">
                            <div className="flex justify-between items-center mb-1">
                                <div className="text-xs text-blue-500 font-bold tracking-widest">ANTIGRAVITY ENGINE</div>
                                {!isMobile && (
                                    <button
                                        onClick={() => setShowQR(true)}
                                        className="text-gray-400 hover:text-white px-2 py-1 rounded border border-gray-700 bg-[#161a22] text-xs flex items-center gap-1"
                                    >
                                        <i className="ri-qr-code-line"></i> TEL
                                    </button>
                                )}
                                {isMobile && (
                                    <button
                                        onClick={() => setShowQR(true)}
                                        className="text-gray-400 hover:text-white"
                                    >
                                        <i className="ri-qr-code-line text-xl"></i>
                                    </button>
                                )}
                            </div>

                            {/* FAVORITES LIST WITH ALERTS */}
                            <div className="mb-4 bg-[#0a0d12] rounded-lg border border-purple-900/30">
                                {(() => {
                                    // Check if any favorite has a triggered alert
                                    const anyAlertTriggered = Object.values(favoritePrices).some(p => p.triggered_alerts && p.triggered_alerts.length > 0);

                                    return (
                                        <div
                                            className="flex justify-between items-center p-3 cursor-pointer hover:bg-purple-900/10 transition-colors"
                                            onClick={() => setFavoritesOpen(!favoritesOpen)}
                                        >
                                            <div className={`text-xs font-bold flex items-center gap-2 ${anyAlertTriggered ? 'text-yellow-500' : 'text-purple-400'}`}>
                                                <i className={`ri-star-fill ${anyAlertTriggered ? 'animate-pulse' : ''}`}></i> FAVORİLERİM
                                            </div>
                                            <i className={`ri-arrow-${favoritesOpen ? 'up' : 'down'}-s-line text-purple-400`}></i>
                                        </div>
                                    );
                                })()}

                                {favoritesOpen && (
                                    <div className="px-3 pb-3 space-y-2 max-h-80 overflow-y-auto scrollbar-thin">
                                        {Object.keys(favorites).length === 0 ? (
                                            <div className="text-[10px] text-gray-600 italic text-center py-4">
                                                Henüz favori eklenmedi
                                            </div>
                                        ) : (
                                            Object.entries(favorites).map(([sym, data]) => {
                                                const priceData = favoritePrices[sym];
                                                const currentPrice = priceData?.price;
                                                const triggeredAlerts = priceData?.triggered_alerts || [];
                                                const hasAlert = triggeredAlerts.length > 0;

                                                return (
                                                    <div key={sym} className="bg-[#161a22] rounded p-2 border border-gray-800">
                                                        {/* Symbol and Price Row */}
                                                        <div className="flex justify-between items-center mb-2">
                                                            <div
                                                                onClick={() => loadData(sym)}
                                                                className="flex-1 cursor-pointer"
                                                            >
                                                                <div className="flex items-center gap-2">
                                                                    <span className="font-bold text-xs text-white">{sym}</span>
                                                                    {hasAlert && (
                                                                        <span className="text-yellow-500 animate-pulse" title="Alarm tetiklendi!">
                                                                            ⚠️
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                <div className="text-[10px] text-gray-400 font-mono">
                                                                    {currentPrice ? `${currentPrice.toFixed(2)} TL` : 'Yükleniyor...'}
                                                                </div>
                                                            </div>
                                                            <button
                                                                onClick={() => removeFromFavorites(sym)}
                                                                className="px-1.5 py-0.5 text-[10px] text-red-400 hover:bg-red-900/20 rounded transition-all"
                                                            >
                                                                <i className="ri-close-line"></i>
                                                            </button>
                                                        </div>

                                                        {/* Alert Inputs Row */}
                                                        <div className="flex gap-1">
                                                            {[0, 1, 2].map(idx => {
                                                                // Use editingAlerts if available, otherwise use data.alerts
                                                                const currentAlerts = editingAlerts[sym] || data.alerts;
                                                                const alertValue = currentAlerts[idx];
                                                                const isTriggered = triggeredAlerts.includes(idx);

                                                                return (
                                                                    <input
                                                                        key={idx}
                                                                        type="number"
                                                                        step="0.01"
                                                                        min="0"
                                                                        placeholder={`${idx + 1}`}
                                                                        value={alertValue || ''}
                                                                        onClick={(e) => {
                                                                            // Prevent click from bubbling to parent elements
                                                                            e.stopPropagation();
                                                                        }}
                                                                        onChange={(e) => {
                                                                            const newAlerts = [...(editingAlerts[sym] || data.alerts)];
                                                                            newAlerts[idx] = e.target.value ? parseFloat(e.target.value) : null;
                                                                            setEditingAlerts(prev => ({ ...prev, [sym]: newAlerts }));
                                                                        }}
                                                                        onBlur={() => {
                                                                            if (editingAlerts[sym]) {
                                                                                updateAlerts(sym, editingAlerts[sym]);
                                                                            }
                                                                        }}
                                                                        onKeyDown={(e) => {
                                                                            if (e.key === 'Enter') {
                                                                                e.target.blur();
                                                                            }
                                                                        }}
                                                                        className={`flex-1 min-w-0 bg-[#0d1015] text-[10px] text-center text-gray-300 border rounded px-1 py-1 outline-none focus:border-purple-500 ${isTriggered ? 'border-yellow-500 bg-yellow-900/20' : 'border-gray-700'
                                                                            }`}
                                                                    />
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                )}
                            </div>

                            <div className="relative">
                                {/* Search Box */}
                                <input className="search-box" placeholder="HİSSE"
                                    value={symbol} onChange={handleSearch}
                                    onKeyDown={e => e.key === 'Enter' && loadData(symbol)}
                                />
                                {sug.length > 0 && (
                                    <div className="absolute top-full left-0 w-full bg-[#161b22] border border-gray-700 rounded z-50 shadow-xl max-h-64 overflow-y-auto">
                                        {sug.map(s => (
                                            <div key={s} onClick={() => loadData(s)} className="p-3 hover:bg-blue-600 cursor-pointer">
                                                <div className="font-bold text-sm text-white">{s}</div>
                                                <div className="text-xs text-gray-400">{stockNames[s] || s}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            {data && <div className="mt-2 text-[10px] text-gray-500 font-bold truncate max-w-[200px]">{data.fundamentals?.name}</div>}

                            {/* Add to Favorites Button */}
                            {symbol && data && (
                                <div className="mt-2">
                                    {favorites[symbol] ? (
                                        <button
                                            onClick={() => removeFromFavorites(symbol)}
                                            className="w-full px-2 py-1.5 text-[10px] bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-600/50 rounded font-bold transition-colors flex items-center justify-center gap-1"
                                        >
                                            <i className="ri-star-fill"></i> Favorilerden Çıkar
                                        </button>
                                    ) : (
                                        <button
                                            onClick={() => addToFavorites(symbol)}
                                            className="w-full px-2 py-1.5 text-[10px] bg-purple-600/20 hover:bg-purple-600/40 text-purple-400 border border-purple-600/50 rounded font-bold transition-colors flex items-center justify-center gap-1"
                                        >
                                            <i className="ri-star-line"></i> Favorilere Ekle
                                        </button>
                                    )}
                                </div>
                            )}

                            {/* RISK MODE SELECTOR & VIEW MODE */}
                            <div className="mt-4 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <span className="text-[10px] text-gray-500 font-bold">MOD:</span>
                                    <select
                                        value={riskMode}
                                        onChange={(e) => {
                                            setRiskMode(e.target.value);
                                            if (symbol) loadData(symbol, false, interval, e.target.value);
                                        }}
                                        className="bg-[#161a22] text-xs text-gray-300 border border-[#232730] rounded px-2 py-1 outline-none hover:border-gray-500"
                                    >
                                        <option value="conservative">TUTUCU (Önerilen)</option>
                                        <option value="aggressive">AGRESİF (Riskli)</option>
                                    </select>
                                </div>

                                {/* VIEW MODE TOGGLE */}
                                <div className="flex bg-[#161a22] rounded border border-[#232730] p-0.5">
                                    <button
                                        onClick={() => setViewMode('simple')}
                                        className={`px-2 py-1 text-[10px] font-bold rounded ${viewMode === 'simple' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:text-gray-300'}`}
                                    >
                                        BASİT
                                    </button>
                                    <button
                                        onClick={() => setViewMode('pro')}
                                        className={`px-2 py-1 text-[10px] font-bold rounded ${viewMode === 'pro' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:text-gray-300'}`}
                                    >
                                        PRO
                                    </button>
                                </div>
                            </div>

                            {riskMode === 'conservative' && (
                                <div className="mt-1 text-[9px] text-green-500 flex items-center gap-1">
                                    <i className="ri-shield-check-line"></i> Filtreler Aktif (EMA200 + ADX)
                                </div>
                            )}
                        </div>

                        {/* Analysis Content */}
                        <div className="flex-1 overflow-y-auto scrollbar-hide">
                            {!result ? (
                                <div className="p-10 text-center opacity-30 mt-20">
                                    <div className="text-6xl mb-4">🧠</div>
                                    <p>Hisse Kodu Girerek<br />Analizi Başlatın</p>
                                </div>
                            ) : (
                                <div>
                                    {/* Main Score Check */}
                                    <div className="p-6 text-center border-b border-[#232730] bg-[#161a22]">
                                        <div className="text-sm text-gray-400 mb-2">GENEL SKOR</div>
                                        <div className={`text-6xl font-black ${result.scores.total >= 75 ? 'text-green-500' : result.scores.total >= 60 ? 'text-yellow-500' : 'text-red-500'}`}>
                                            {result.scores.total}
                                        </div>
                                        <div className={`mt-2 inline-block px-3 py-1 rounded text-sm font-black tracking-wider ${result.signal.color} ${result.signal.bg}`}>
                                            {result.signal.label}
                                        </div>
                                        <div className="text-xs tracking-widest opacity-50 mt-1">%100 ÜZERİNDEN</div>

                                        {/* SIMPLE MODE SUMMARY TEXT */}
                                        {viewMode === 'simple' && (
                                            <div className="mt-4 text-xs text-gray-400 px-4">
                                                {result.scores.total >= 60 ?
                                                    "Temel ve teknik veriler olumlu görünüyor." :
                                                    "Risk seviyesi yüksek, dikkatli olunmalı."}
                                            </div>
                                        )}
                                    </div>

                                    {/* PRO MODE CONTENT */}
                                    {viewMode === 'pro' && (
                                        <>
                                            {/* STRATEGY SUMMARY CARD (MOVED) */}
                                            {data?.trade_plan ? (
                                                <div className="p-4 bg-[#11141a] border-b border-[#232730] shadow-inner">
                                                    <div className="text-xs font-bold text-blue-500 mb-3 tracking-widest border-b border-gray-800 pb-2">STRATEJİ ÖZETİ</div>

                                                    <div className="space-y-3">
                                                        <div className="flex justify-between items-center text-sm">
                                                            <span className="text-gray-400">Giriş (Mevcut)</span>
                                                            <span className="font-mono font-bold text-white">{data.currentPrice?.toFixed(2)} TL</span>
                                                        </div>

                                                        <div className="flex justify-between items-center text-sm">
                                                            <span className="text-orange-400 flex items-center gap-1"><i className="ri-shield-line"></i> Stop (İz Süren)</span>
                                                            <span className="font-mono font-bold text-orange-400">
                                                                {data.trade_plan?.stop_loss ? data.trade_plan.stop_loss.toFixed(2) : '-'} TL
                                                            </span>
                                                        </div>

                                                        <div className="flex justify-between items-center text-sm">
                                                            <span className="text-green-400 flex items-center gap-1"><i className="ri-target-line"></i> Hedef (1:2)</span>
                                                            <span className="font-mono font-bold text-green-400">
                                                                {data.trade_plan?.take_profit ? data.trade_plan.take_profit.toFixed(2) : '-'} TL
                                                            </span>
                                                        </div>

                                                        <div className="mt-2 pt-2 border-t border-gray-800">
                                                            <div className="flex justify-between items-center text-xs">
                                                                <span className="text-gray-500">Trend Durumu</span>
                                                                {result?.signal && result.signal.label !== 'SAT' && result.signal.label !== 'GÜÇLÜ SAT' ? (
                                                                    <span className="text-green-500 font-bold flex items-center gap-1">
                                                                        <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span> GÜÇLÜ
                                                                    </span>
                                                                ) : (
                                                                    <span className="text-red-500 font-bold flex items-center gap-1">
                                                                        <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span> ZAYIF
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : null}

                                            {/* Modules */}
                                            <ScoreItem label="1. FİLTRE" status="PASS" info="Hacim, ATR, Spekülasyon: Temiz" />
                                            <ScoreItem label="2. YÖN" score={result?.scores?.sDir} max={25} info={`Bulut Durumu: ${result?.cloudStatus}`} />
                                            <ScoreItem label="3. YAPI" score={result?.scores?.sStr} max={10} info="Fibonacci & Destek" />
                                            <ScoreItem label="4. MOMENTUM" score={result?.scores?.sMom} max={15} info="Hacim Profili" />
                                            <ScoreItem label="5. MUM TETİĞİ" score={result?.scores?.sBias} max={20} info={`Formasyon: ${result?.pattern}`} />
                                            <ScoreItem label="6. KATALİZÖR" score={result?.scores?.sCat} max={15} info="Haber Akışı (Auto)" />
                                            <ScoreItem label="7. RİSK" score={result?.scores?.sRisk} max={15} info={`R/R: ${result?.risk?.rr?.toFixed(2)}`} />

                                            {/* Trade Plan */}
                                            <div className="p-5 bg-[#0d1015] border-t border-[#232730] space-y-3">
                                                <div className="text-xs font-bold text-gray-500 mb-2">İŞLEM PLANI (AUTO)</div>
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="text-gray-400">Giriş</span>
                                                    <span className="font-mono text-white">{result?.risk?.zoneLow?.toFixed(2)} - {result?.risk?.zoneHigh?.toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="text-red-400">Stop (%{(result?.risk?.riskPct * 100)?.toFixed(1)})</span>
                                                    <span className="font-mono text-red-400">{result?.risk?.stop?.toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="text-green-400">Hedef</span>
                                                    <span className="font-mono text-green-400 font-bold">{result?.risk?.target?.toFixed(2)}</span>
                                                </div>

                                                {/* RSI WIDGET */}
                                                <div className="mt-2 pt-2 border-t border-gray-800 flex justify-between items-center">
                                                    <span className="text-xs text-purple-400 font-bold">RSI (14)</span>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`text-sm font-black ${result.rsi > 70 ? 'text-red-500' : result.rsi < 30 ? 'text-green-500' : 'text-gray-400'}`}>
                                                            {result.rsi?.toFixed(1)}
                                                        </span>
                                                        <span className="text-xs text-gray-500 bg-gray-800 px-1 rounded">{result.rsiSlope}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* --- ADVANCED ANALYSIS WIDGET --- */}
                                            {advResults && (
                                                <div className="p-4 border-t border-[#232730] bg-[#161a22]">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <div className="text-xs font-bold text-purple-400 tracking-widest flex items-center gap-2">
                                                            <i className="ri-magic-line"></i> YAPAY ZEKA DRONE
                                                        </div>
                                                    </div>

                                                    {/* VOLUME SCAN RESULTS */}
                                                    {volResults && (

                                            </div>

                                            {/* Fibonacci */}
                                            <div className="flex justify-between items-center text-xs">
                                                <div>
                                                    <div className="text-gray-300 font-bold">FIBONACCI</div>
                                                    <div className="text-[10px] text-gray-500">
                                                        Fiyat Konumu
                                                    </div>
                                                </div>
                                                <div className={`px-2 py-1 rounded font-bold ${data.currentPrice > result.risk?.zoneLow ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                                                    {data.currentPrice > result.risk?.zoneLow ? 'ALIM UYGUN' : 'UYGUN DEĞİL'}
                                                </div>
                                            </div>

                                            {/* RSI */}
                                            <div className="flex justify-between items-center text-xs">
                                                <div>
                                                    <div className="text-gray-300 font-bold">RSI MOMENTUM</div>
                                                    <div className="text-[10px] text-gray-500">
                                                        Değer: {result.rsi?.toFixed(1)} ({result.rsiSlope})
                                                    </div>
                                                </div>
                                                <div className={`px-2 py-1 rounded font-bold ${result.rsi > 50 ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                                                    {result.rsi > 50 ? 'ALIM UYGUN' : 'UYGUN DEĞİL'}
                                                </div>
                                            </div>

                                        </div>
                                    ) : <div className="text-xs text-gray-500">Veri bekleniyor...</div>}
                                </div>

                                {/* 3. MODE BADGE */}
                                <div className="flex-1 flex flex-col items-center justify-center border-l border-[#232730] pl-6">
                                    {result && result.trend_health && (
                                        <>
                                            <div className="text-xs text-gray-500 mb-1">STRATEJİ MODU</div>
                                            <div className={`text-3xl font-black ${result.trend_health.mode === 'TREND' ? 'text-green-500' : 'text-yellow-500'}`}>
                                                {result.trend_health.mode === 'TREND' ? 'YÜKSELİŞ' : 'YATAY'}
                                            </div>
                                            <div className="text-[10px] text-gray-400 mt-1 font-mono">
                                                HEDEF: {result.target}
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
